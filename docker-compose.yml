services:
  datt-db:
    image: kartoza/postgis:15-3.3
    container_name: datt-db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASS=${POSTGRES_PASSWORD}
      - POSTGRES_DB=datt
    ports:
      - "${DB_PORT_IN}:5432"
    volumes:
      - ${DB_VOLUMES}
    networks:
      - datt-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d datt -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  spring-boot-app:
    build:
      context: ./spring-boot-app
      dockerfile: Dockerfile
    container_name: spring-boot-app
    restart: on-failure:3
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://datt-db:5432/datt
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    volumes:
      - ${OCI_CONFIG_VOLUME:-/home/ubuntu/.oci}:/root/.oci:ro
      - ./uploads:/app/uploads
    networks:
      - datt-network
    depends_on:
      datt-db:
        condition: service_healthy

  next-js-app:
    build:
      context: ./next-js-app
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
        - NEXT_PUBLIC_KAKAO_MAP_APP_KEY=${NEXT_PUBLIC_KAKAO_MAP_APP_KEY}
        - NEXT_PUBLIC_KAKAO_CLIENT_ID=${NEXT_PUBLIC_KAKAO_CLIENT_ID}
        - NEXT_PUBLIC_KAKAO_REDIRECT_URI=${NEXT_PUBLIC_KAKAO_REDIRECT_URI}
        - NEXT_PUBLIC_NAVER_CLIENT_ID=${NEXT_PUBLIC_NAVER_CLIENT_ID}
        - NEXT_PUBLIC_NAVER_REDIRECT_URI=${NEXT_PUBLIC_NAVER_REDIRECT_URI}
    container_name: next-js-app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
      - NEXT_PUBLIC_KAKAO_MAP_APP_KEY=${NEXT_PUBLIC_KAKAO_MAP_APP_KEY}
      - NEXT_PUBLIC_KAKAO_CLIENT_ID=${NEXT_PUBLIC_KAKAO_CLIENT_ID}
      - NEXT_PUBLIC_KAKAO_REDIRECT_URI=${NEXT_PUBLIC_KAKAO_REDIRECT_URI}
      - NEXT_PUBLIC_NAVER_CLIENT_ID=${NEXT_PUBLIC_NAVER_CLIENT_ID}
      - NEXT_PUBLIC_NAVER_REDIRECT_URI=${NEXT_PUBLIC_NAVER_REDIRECT_URI}
    networks:
      - datt-network
    depends_on:
      - spring-boot-app

