services:
  datt-db:
    image: kartoza/postgis:15-3.3
    container_name: datt-db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASS=${POSTGRES_PASSWORD}
      - POSTGRES_DB=datt
    ports:
      - "${DB_PORT_IN}:5432"
    volumes:
      - datt-db-data:/var/lib/postgresql
    networks:
      - datt-network
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d datt -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: datt-es
    restart: always
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - datt-es-data:/usr/share/elasticsearch/data
    command: >
      /bin/sh -c "
      if [ ! -d plugins/analysis-nori ]; then
        bin/elasticsearch-plugin install --batch analysis-nori;
      fi;
      exec /usr/share/elasticsearch/bin/elasticsearch
      "
    networks:
      - datt-network
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  spring-boot-app:
    build:
      context: ./spring-boot-app
      dockerfile: Dockerfile
    container_name: spring-boot-app
    restart: on-failure:3
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://datt-db:5432/datt
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=wave-kafka:9092
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - ${OCI_CONFIG_VOLUME:-/home/ubuntu/.oci}:/root/.oci:ro
      - ./uploads:/app/uploads
    networks:
      - datt-network
    deploy:
      resources:
        limits:
          memory: 1.5g
    depends_on:
      datt-db:
        condition: service_healthy
      wave-kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  next-js-app:
    build:
      context: ./next-js-app
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
        - NEXT_PUBLIC_KAKAO_MAP_APP_KEY=${NEXT_PUBLIC_KAKAO_MAP_APP_KEY}
        - NEXT_PUBLIC_KAKAO_CLIENT_ID=${NEXT_PUBLIC_KAKAO_CLIENT_ID}
        - NEXT_PUBLIC_KAKAO_REDIRECT_URI=${NEXT_PUBLIC_KAKAO_REDIRECT_URI}
    container_name: next-js-app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
      - NEXT_PUBLIC_KAKAO_MAP_APP_KEY=${NEXT_PUBLIC_KAKAO_MAP_APP_KEY}
      - NEXT_PUBLIC_KAKAO_CLIENT_ID=${NEXT_PUBLIC_KAKAO_CLIENT_ID}
      - NEXT_PUBLIC_KAKAO_REDIRECT_URI=${NEXT_PUBLIC_KAKAO_REDIRECT_URI}
      - NODE_OPTIONS=--max-old-space-size=1024
    volumes:
      - ./docs:/docs:ro
    networks:
      - datt-network
    deploy:
      resources:
        limits:
          memory: 1.5g
    depends_on:
      - spring-boot-app

  nginx:
    image: nginx:latest
    container_name: nginx-server
    ports:
      - "${NGINX_PORT_IN:-80}:80"
      - "${NGINX_PORT_IN_SSL:-443}:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - spring-boot-app
      - next-js-app
    restart: always
    networks:
      - datt-network
    deploy:
      resources:
        limits:
          memory: 256m

  certbot:
    image: certbot/certbot
    container_name: certbot-ssl
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - datt-network

  wave-redis:
    image: redis:7-alpine
    container_name: wave-redis
    restart: always
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    networks:
      - datt-network
    deploy:
      resources:
        limits:
          memory: 512m

  wave-kafka:
    image: apache/kafka:latest
    container_name: wave-kafka
    restart: always
    ports:
      - "9093:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://wave-kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@wave-kafka:9093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_JVM_PERFORMANCE_OPTS=-server -XX:MetaspaceSize=96m -XX:+UseG1GC -XX:MaxGCPauseMillis=20
      - KAFKA_OPTS=-Xms512m -Xmx512m
    networks:
      - datt-network
    deploy:
      resources:
        limits:
          memory: 1g
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  wave-messaging-service:
    image: eclipse-temurin:17-jre
    container_name: wave-messaging-service
    restart: always
    ports:
      - "8081:8081"
    volumes:
      - /home/ubuntu/wave-messaging-service/build/libs:/app
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://datt-db:5432/datt_wave
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_DATA_REDIS_HOST=wave-redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=wave-kafka:9092
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
    entrypoint: ["java", "-Xms512m", "-Xmx512m", "-jar", "/app/wave-messaging-service-0.0.1-SNAPSHOT.jar"]
    networks:
      - datt-network
    deploy:
      resources:
        limits:
          memory: 1g
    depends_on:
      datt-db:
        condition: service_healthy
      wave-redis:
        condition: service_started
      wave-kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

networks:
  datt-network:
    driver: bridge

volumes:
  datt-db-data:
  datt-es-data: