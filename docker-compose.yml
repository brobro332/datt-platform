services:
  datt-db:
    image: kartoza/postgis:15-3.3
    container_name: datt-db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASS=${POSTGRES_PASSWORD}
      - POSTGRES_DB=datt
    ports:
      - "${DB_PORT_IN}:5432"
    volumes:
      - datt-db-data:/var/lib/postgresql
    networks:
      - datt-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d datt -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  spring-boot-app:
    build:
      context: ./spring-boot-app
      dockerfile: Dockerfile
    container_name: spring-boot-app
    restart: on-failure:3
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://datt-db:5432/datt
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    volumes:
      - ${OCI_CONFIG_VOLUME:-/home/ubuntu/.oci}:/root/.oci:ro
      - ./uploads:/app/uploads
    networks:
      - datt-network
    depends_on:
      datt-db:
        condition: service_healthy

  next-js-app:
    build:
      context: ./next-js-app
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
        - NEXT_PUBLIC_KAKAO_MAP_APP_KEY=${NEXT_PUBLIC_KAKAO_MAP_APP_KEY}
        - NEXT_PUBLIC_KAKAO_CLIENT_ID=${NEXT_PUBLIC_KAKAO_CLIENT_ID}
        - NEXT_PUBLIC_KAKAO_REDIRECT_URI=${NEXT_PUBLIC_KAKAO_REDIRECT_URI}
    container_name: next-js-app
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
      - NEXT_PUBLIC_KAKAO_MAP_APP_KEY=${NEXT_PUBLIC_KAKAO_MAP_APP_KEY}
      - NEXT_PUBLIC_KAKAO_CLIENT_ID=${NEXT_PUBLIC_KAKAO_CLIENT_ID}
      - NEXT_PUBLIC_KAKAO_REDIRECT_URI=${NEXT_PUBLIC_KAKAO_REDIRECT_URI}
    volumes:
      - ./docs:/docs:ro
    networks:
      - datt-network
    depends_on:
      - spring-boot-app

  nginx:
    image: nginx:latest
    container_name: nginx-server
    ports:
      - "${NGINX_PORT_IN:-80}:80"
      - "${NGINX_PORT_IN_SSL:-443}:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - spring-boot-app
      - next-js-app
    restart: always
    networks:
      - datt-network

  certbot:
    image: certbot/certbot
    container_name: certbot-ssl
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - datt-network

  wave-redis:
    image: redis:7-alpine
    container_name: wave-redis
    restart: always
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    networks:
      - datt-network

  wave-kafka:
    image: bashj79/kafka-kraft:latest
    container_name: wave-kafka
    restart: always
    ports:
      - "9093:9092"
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://wave-kafka:9092"
    networks:
      - datt-network

  wave-messaging-service:
    image: eclipse-temurin:17-jre
    container_name: wave-messaging-service
    restart: always
    ports:
      - "8081:8081"
    volumes:
      - /home/ubuntu/wave-messaging-service/build/libs:/app
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://datt-db:5432/datt_wave
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD}
      - SPRING_DATA_REDIS_HOST=wave-redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=wave-kafka:9092
    entrypoint: ["java", "-jar", "/app/wave-messaging-service-0.0.1-SNAPSHOT.jar"]
    networks:
      - datt-network
    depends_on:
      datt-db:
        condition: service_healthy
      wave-redis:
        condition: service_started
      wave-kafka:
        condition: service_started

networks:
  datt-network:
    driver: bridge

volumes:
  datt-db-data: