spring:
  application:
    name: datt

  datasource:
    url: ${DATASOURCE_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  batch:
    job:
      enabled: false

  data:
    service-key: ${DATA_SERVICE_KEY}
    path: ${DATA_PATH}
    div-id: ${DATA_DIV_ID}
    key: ${DATA_KEY}

domain:
  backend: ${DOMAIN_BACKEND}
  frontend: ${DOMAIN_FRONTEND}
  agent: ${DOMAIN_AGENT}