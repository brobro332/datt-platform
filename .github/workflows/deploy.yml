name: Deploy DATT Application with Docker Compose

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to OCI VM via Docker Compose
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Compress project files
      run: |
        tar -czf project.tar.gz \
          --exclude='.git' \
          --exclude='.github' \
          --exclude='node_modules' \
          --exclude='.next' \
          --exclude='build' \
          --exclude='.gradle' \
          .

    - name: Create destination directory on OCI VM
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VM_HOST }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        script: |
          mkdir -p /home/ubuntu/datt-platform

    - name: Transfer project archive via SSH SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VM_HOST }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        source: "project.tar.gz"
        target: "/home/ubuntu/datt-platform"

    - name: Extract, Configure, and Build/Run via Docker Compose
      uses: appleboy/ssh-action@v1.0.3
      env:
        BACKEND_ENV: ${{ secrets.BACKEND_ENV }}
        NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      with:
        host: ${{ secrets.VM_HOST }}
        username: ubuntu
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 22
        envs: BACKEND_ENV, NEXT_PUBLIC_API_URL
        script: |
          cd /home/ubuntu/datt-platform
          tar -xzf project.tar.gz
          rm project.tar.gz
          
          # Write environment variables to .env
          echo "$BACKEND_ENV" > .env
          echo "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL" >> .env
          
          # Run Docker Compose (build and start in background)
          if command -v docker-compose &> /dev/null; then
            docker-compose down || true
            docker-compose up -d --build
          else
            docker compose down || true
            docker compose up -d --build
          fi
