server {
    listen 80;
    listen [::]:80;
    server_name datt-prd.xyz;

    # Certbot Let's Encrypt 인증서 발급을 위한 챌린지 경로 허용
    location /.well-known/acme-challenge/ {
        allow all;
        root /var/www/certbot;
    }

    # 모든 HTTP 요청을 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name datt-prd.xyz;

    client_max_body_size 20M;

    ssl_certificate /etc/letsencrypt/live/datt-prd.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/datt-prd.xyz/privkey.pem;

    # SSL 보안 옵션 최적화
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Spring Boot 백엔드 컨테이너 연결
    location /api/ {
        proxy_pass http://spring-boot-app:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Wave Messaging Service API 통합 라우팅 (chat 및 workspaces 하위 모든 API 대응)
    location ~ ^/api/(chat|workspaces)(/.*)?$ {
        proxy_pass http://wave-messaging-service:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Wave Messaging WebSocket (STOMP) 연결
    location /ws-stomp {
        proxy_pass http://wave-messaging-service:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Next.js 프론트엔드 컨테이너 연결
    location / {
        proxy_pass http://next-js-app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
